# ３つのコンテナ（web,app,db）を定義
services:
  web:
    image: nginx:latest
    ports:
    # Macの8080ポートをコンテナの80ポートにつなぐ（localhost:8080でアクセス）
      - "8080:80"
    volumes:
    # Macのsrc/フォルダとコンテナ内の/var/www/htmlを同期する（Macでコードを編集するとコンテナにも即反映）
    # バインドマウント：MacのフォルダとDockerのコンテナを直接繋ぐ
    # Macのパス:コンテナのパス
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    # 起動順序の制御（appが起動したらwebを起動する）
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./src:/var/www/html
    ports:
      - "5173:5173"
    # 起動順序の制御（dbが起動したらappを起動する）
    depends_on:
      - db

  db:
    image: mysql:9.4
    environment:
      MYSQL_DATABASE: readoo
      MYSQL_USER: readoo
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
    # named volume：MacのフォルダではなくDockerが専用の保管場所を用意
    # servicesの中で使う、という宣言
      - db-data:/var/lib/mysql
    ports:
      - "6306:3306"

# コンテナを削除してもDBのデータが消えないようにする
# db-dataという名前の保管場所をDockerに用意する、という宣言
volumes:
  db-data: